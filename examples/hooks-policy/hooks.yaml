version: 1

profiles:
  auto: true
  definitions:
    # Custom profiles can represent a product, framework, tool, or any other
    # repository characteristic. Go and Node profiles are built in.
    sneat-product:
      order: 200
      detect:
        any_files:
          - sneat.project.yaml
      hooks:
        pre-push:
          template: templates/sneat-product/pre-push.sh

metrics:
  enabled: true
  # Opt in to pseudonymous grouping when you want to compare exported events.

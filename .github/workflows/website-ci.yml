name: Website CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/website-ci.yml'
      - 'website/**'
  pull_request:
    paths:
      - '.github/workflows/website-ci.yml'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Check and build website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26
      # pnpm/action-setup's self-installer currently crashes on pnpm@11.12.0;
      # npx runs the exact package-manager version declared by website/package.json.
      - run: npx --yes pnpm@11.12.0 install --frozen-lockfile
      - run: npx --yes pnpm@11.12.0 build

name: Go CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/go-ci.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - '.github/workflows/go-ci.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          set -eu
          OUT=$(gofmt -l .)
          if [ -n "$OUT" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$OUT"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

      - name: go build
        run: go build ./...

      - name: go test with coverage threshold
        env:
          # Measured after adding detected hook profiles and composition: 58.4%.
          MINIMUM_COVERAGE: "58.0"
        run: |
          go test ./... -coverprofile=profile.cov -count=1
          total_coverage="$(go tool cover -func=profile.cov | awk '/^total:/ { gsub(/%/, "", $3); print $3 }')"
          echo "Total coverage: ${total_coverage}% (required: ${MINIMUM_COVERAGE}%)"
          awk -v actual="$total_coverage" -v required="$MINIMUM_COVERAGE" 'BEGIN {
            if (actual < required) {
              printf "Coverage %.2f%% is below required %.2f%%\n", actual, required
              exit 1
            }
          }'

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: wb-go-coverage
          path: profile.cov
          if-no-files-found: error
          retention-days: 14
